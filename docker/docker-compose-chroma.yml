# 开发环境依赖（Chroma + Redis + MinIO）
# 在 evaluation 目录下执行：
#   docker compose -f docker/docker-compose-chroma.yml pull
#   docker compose -f docker/docker-compose-chroma.yml up -d
#   docker compose -f docker/docker-compose-chroma.yml down
#   docker compose -f docker/docker-compose-chroma.yml down -v
# MinIO 初始化（创建 public 桶 evaluation）：
#   docker compose -f docker/docker-compose-chroma.yml up -d minio minio-init
# 默认 HTTP：http://127.0.0.1:8000（与 application.yml 中 CHROMA_PORT 一致）
# 参考：https://docs.spring.io/spring-ai/reference/1.0/api/vectordbs/chroma.html
services:
  chroma:
    image: ghcr.io/chroma-core/chroma
    ports:
      - "8000:8000"

  redis:
    image: redis
    command: ["redis-server", "--requirepass", "123456"]
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # 初始化：创建桶并设置为 public（匿名可读）
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for MinIO..."
        for i in $(seq 1 60); do
          mc alias set local http://minio:9000 minioadmin minioadmin >/dev/null 2>&1 && break || true
          sleep 1
        done
        mc mb -p local/evaluation || true
        mc anonymous set public local/evaluation
        echo "MinIO bucket ready: evaluation (public)"
    restart: "no"

volumes:
  minio-data:

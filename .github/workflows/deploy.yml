name: Java Backend CI/CD

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # 拉取代码

    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        java-version: '21'  # 使用 Java 21

    - name: Install dependencies and build Java project
      run: |
        cd backend
        mvn clean install -DskipTests  # 构建项目，不运行单元测试（如果你需要可以去掉 -DskipTests）

    - name: Deploy to Server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_IP: ${{ secrets.SERVER_IP }}
        USERNAME: ${{ secrets.USERNAME }}
      run: |
        # 将私钥添加到 SSH agent
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

        # SSH 到云服务器并执行部署步骤
        ssh $USERNAME@$SERVER_IP << 'EOF'
          cd /path/to/backend
          git pull origin main  # 拉取最新代码
          mvn clean install -DskipTests  # 构建项目
          pm2 restart backend  # 重启后端服务（假设使用 pm2 管理）
        EOF
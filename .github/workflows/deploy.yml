name: Java Backend CI/CD

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v2
      with:
        java-version: '21'  # 使用 Java 21
        distribution: 'adoptopenjdk'  # 设置 JDK 分发方式为 AdoptOpenJDK

    - name: Install dependencies and build Java project
      run: |
        cd evaluation
        mvn clean install -DskipTests  # 构建项目，不运行单元测试（如果你需要可以去掉 -DskipTests）

    - name: Deploy to Server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_IP: ${{ secrets.SERVER_IP }}
        USERNAME: ${{ secrets.USERNAME }}
      run: |
        # 将私钥添加到 SSH agent
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
        chmod 644 ~/.ssh/known_hosts

        # SSH 到云服务器并执行部署步骤
        ssh $USERNAME@$SERVER_IP << 'EOF'
          cd /opt/evaluation  # 进入正确的项目目录
          git pull origin main  # 拉取最新代码
          mvn clean install -DskipTests  # 构建项目
          
          # 停止旧的进程（如果正在运行）
          pkill -f 'evaluation-1.0-SNAPSHOT.jar' || true
          
          # 启动新的后端应用
          nohup java -jar /opt/evaluation/target/evaluation-1.0-SNAPSHOT.jar > /opt/evaluation/logs/app.log 2>&1 &
        EOF